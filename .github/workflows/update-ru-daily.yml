name: Update Russian daily

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update Russian daily files
        run: node scripts/update-ru-daily.mjs

      - name: Commit updated content
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/scripts/daily-ru.js site/daily/ru.html
          git commit -m "Update Russian daily"
          git push
