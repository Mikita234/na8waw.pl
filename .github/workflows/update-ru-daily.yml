name: Update daily meditation

on:
  schedule:
    - cron: "5 22,23,0,1,2,3,4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update daily files
        run: node scripts/update-daily.mjs

      - name: Commit updated content
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/scripts/daily-uk.js site/scripts/daily-ru.js site/scripts/daily-data.js site/scripts/daily.js site/scripts/main.js site/index.html site/ru.html site/uk.html site/daily/ru.html site/daily/uk.html site/daily/today-ru.html site/daily/today-uk.html
          git commit -m "Update daily meditation"
          git push
