<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>na8waw.pl</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --text: #1c1712;
        --accent: #b8502d;
        --muted: #6d6258;
        --border: #d8c9b6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(184, 80, 45, 0.18), transparent 32%),
          linear-gradient(135deg, var(--bg), #ece5d8);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 48px 40px;
        background: rgba(255, 250, 240, 0.92);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(28, 23, 18, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.7;
        color: var(--muted);
      }

      strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>na8waw.pl</h1>
      <p>
        Базовый проект готов. Следующий шаг:
        <strong>подключить серверные секреты и включить автодеплой</strong>.
      </p>
    </main>
  </body>
</html>
